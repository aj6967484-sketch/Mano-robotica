<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador Mano Robótica 3D</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    body { margin: 0; background: #050508; color: #fff; font-family: sans-serif; overflow: hidden; }
    #UI { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; }
    #camera_container { position: absolute; bottom: 20px; left: 20px; width: 120px; height: 90px; border: 2px solid #00f2fe; border-radius: 8px; overflow: hidden; }
    video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="UI"><h1>CYBER HAND 3D</h1><div id="status">Iniciando...</div></div>
  <div id="camera_container"><video id="webcam" autoplay playsinline></video></div>
  <canvas id="canvas3d"></canvas>

  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 15;
    const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('canvas3d'), antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);

    // Luces
    scene.add(new THREE.AmbientLight(0x404040));
    const light = new THREE.PointLight(0x00f2fe, 2, 50);
    light.position.set(5,5,10);
    scene.add(light);

    // Objetos 3D básicos
    const handGroup = new THREE.Group();
    scene.add(handGroup);
    const geometry = new THREE.SphereGeometry(0.3, 16, 16);
    const material = new THREE.MeshPhongMaterial({color: 0xff0055});
    const joints = [];
    for(let i=0; i<21; i++) {
      const mesh = new THREE.Mesh(geometry, material);
      handGroup.add(mesh);
      joints.push(mesh);
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({maxNumHands: 1, modelComplexity: 1});
    hands.onResults(results => {
      if(results.multiHandLandmarks) {
        const lms = results.multiHandLandmarks[0];
        lms.forEach((lm, i) => {
          joints[i].position.set((lm.x-0.5)*-12, (lm.y-0.5)*-12, (lm.z)*-12);
        });
      }
    });

    const video = document.getElementById('webcam');
    navigator.mediaDevices.getUserMedia({video: true}).then(s => {
      video.srcObject = s;
      new Camera(video, {onFrame: async() => await hands.send({image: video})}).start();
    });

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
