<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Full Body VR Slayer</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style> body { margin: 0; background: #000; overflow: hidden; } #ui { position: absolute; color: #0f0; font-family: monospace; padding: 20px; } </style>
</head>
<body>
  <div id="ui">VIDA VR: <span id="health">100%</span></div>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 5;
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Pistola (controlada por la mano derecha)
    const gun = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.8), new THREE.MeshBasicMaterial({color: 0xffffff}));
    scene.add(gun);

    // Sistema de Pose (Cuerpo completo)
    const pose = new Pose({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
    pose.setOptions({modelComplexity: 1, minDetectionConfidence: 0.5});
    
    pose.onResults(results => {
      if(results.poseLandmarks) {
        // Mover la pistola con la mano derecha (landmark 16)
        const rightHand = results.poseLandmarks[16];
        gun.position.set((rightHand.x-0.5)*-10, (rightHand.y-0.5)*-10, 0);
      }
    });

    // Iniciar cámara
    const v = document.createElement('video');
    navigator.mediaDevices.getUserMedia({video: true}).then(s => { v.srcObject = s; new Camera(v, {onFrame: async() => await pose.send({image: v})}).start(); });

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
