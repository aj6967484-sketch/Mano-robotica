<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dual Cyber Hand 3D</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    canvas { display: block; }
    #video { position: absolute; top: 0; left: 0; width: 100px; opacity: 0.3; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 10;
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Luces para efecto "Realista"
    scene.add(new THREE.AmbientLight(0x444444));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(1, 1, 1);
    scene.add(light);

    // Crear dos manos (grupos 3D)
    const hands3D = [new THREE.Group(), new THREE.Group()];
    hands3D.forEach(h => scene.add(h));
    
    // Función para crear esferas (articulaciones)
    function createHand(group) {
      for(let i=0; i<21; i++) {
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshPhongMaterial({color: 0xcccccc}));
        group.add(mesh);
      }
    }
    createHand(hands3D[0]);
    createHand(hands3D[1]);

    const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands: 2, modelComplexity: 1}); // maxNumHands: 2 activado
    
    hands.onResults(results => {
      hands3D[0].visible = false;
      hands3D[1].visible = false;
      
      if(results.multiHandLandmarks) {
        results.multiHandLandmarks.forEach((landmarks, hIdx) => {
          hands3D[hIdx].visible = true;
          landmarks.forEach((lm, i) => {
            hands3D[hIdx].children[i].position.set((lm.x-0.5)*-15, (lm.y-0.5)*-15, lm.z*-10);
          });
        });
      }
    });

    const video = document.getElementById('video');
    new Camera(video, {onFrame: async() => await hands.send({image: video})}).start();

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
