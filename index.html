<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Realidad VR - Hand Tracking</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 5;
    const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('canvas'), alpha: true});
    renderer.setSize(window.innerWidth, window.innerHeight);

    // Espada Realista (Diseño de filo cónico)
    const sword = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.2, 2), new THREE.MeshPhongMaterial({color: 0x00f2fe, emissive: 0x0055ff}));
    scene.add(sword);

    const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands: 1, modelComplexity: 1});
    
    hands.onResults(results => {
      if(results.multiHandLandmarks) {
        const hand = results.multiHandLandmarks[0];
        const wrist = hand[0]; // Muñeca
        // Mover espada a la posición de la mano detectada
        sword.position.set((wrist.x-0.5)*-10, (wrist.y-0.5)*-10, 0);
      }
    });

    const video = document.getElementById('video');
    new Camera(video, {onFrame: async() => await hands.send({image: video})}).start();

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
