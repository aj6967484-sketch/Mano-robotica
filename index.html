<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Real Hand Tracking</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands: 1, modelComplexity: 1});

    hands.onResults(results => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      if(results.multiHandLandmarks) {
        // Dibujo de mano estilizada (estilo VR fluido)
        ctx.strokeStyle = '#00f2fe';
        ctx.lineWidth = 10;
        ctx.lineCap = 'round';
        results.multiHandLandmarks.forEach(landmarks => {
          // Conectar puntos de la mano para que se vea fluida
          ctx.beginPath();
          landmarks.forEach((lm, i) => {
            const x = (1 - lm.x) * canvas.width;
            const y = lm.y * canvas.height;
            if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          });
          ctx.stroke();
        });
      }
    });

    const video = document.getElementById('video');
    new Camera(video, {onFrame: async() => await hands.send({image: video})}).start();
  </script>
</body>
</html>
