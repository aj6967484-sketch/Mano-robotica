<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control Remoto de Energía 3D</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    canvas { display: block; }
    #video { position: absolute; top: 10px; left: 10px; width: 120px; opacity: 0.4; border-radius: 10px; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 8;
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Crear el "Cubo de Energía"
    const cube = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshNormalMaterial({wireframe: true}));
    scene.add(cube);

    const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands: 1, modelComplexity: 1});
    
    hands.onResults(results => {
      if(results.multiHandLandmarks) {
        const hand = results.multiHandLandmarks[0];
        const indexTip = hand[8]; // Punta del índice
        
        // Mover el cubo a la posición de la mano
        cube.position.set((indexTip.x-0.5)*-12, (indexTip.y-0.5)*-12, indexTip.z*-10);
        
        // Detectar si el puño está cerrado (distancia índice-pulgar)
        const d = Math.hypot(hand[8].x - hand[4].x, hand[8].y - hand[4].y);
        cube.material.color.set(d < 0.05 ? 0xff0000 : 0x00ff00); // Rojo si cierras, Verde si abres
        cube.rotation.y += 0.05;
      }
    });

    const video = document.getElementById('video');
    new Camera(video, {onFrame: async() => await hands.send({image: video})}).start();

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
